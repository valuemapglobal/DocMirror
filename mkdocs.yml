site_name: DocMirror
site_description: Commercial Document Trust Layer for verifiable, audit-ready document signals
site_url: https://valuemapglobal.github.io/DocMirror/
repo_url: https://github.com/valuemapglobal/DocMirror
repo_name: valuemapglobal/DocMirror
edit_uri: blob/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [docmirror]
          import:
            - https://docs.python.org/3/objects.inv
          options:
            show_source: true
            heading_level: 3

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Development Manual (zh-CN): development_manual_zh-CN.md
  - Deployment: deployment.md
  - API Authentication: api-authentication.md
  - Changelog: https://github.com/valuemapglobal/DocMirror/blob/main/CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/valuemapglobal/DocMirror
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/docmirror/
  generator: false

copyright: Copyright &copy; 2026 ValueMap Global
