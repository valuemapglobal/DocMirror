site_name: DocMirror
site_description: Universal document parsing engine — PDF, Image, Office to structured JSON
site_url: https://valuemapglobal.github.io/docmirror/
repo_url: https://github.com/valuemapglobal/docmirror
repo_name: valuemapglobal/docmirror
edit_uri: blob/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [docmirror]
          import:
            - https://docs.python.org/3/objects.inv
          options:
            show_source: true
            heading_level: 3

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - FAQ: faq.md
  - Features:
      - features/adaptive-routing.md
      - features/parser-backends.md
      - features/pdfua.md
  - Benchmarks:
      - Overview: benchmarks/BENCHMARKS.md
      - Comparison: benchmarks/COMPARISON.md
  - Plugins: plugins/INDEX.md
  - API Reference:
      - OpenAPI Spec: openapi/openapi.json
  - Changelog: ../CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/valuemapglobal/docmirror
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/docmirror/
  generator: false

