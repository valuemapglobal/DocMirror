# Private edition packages are not part of the public checkout. The entire job
# is skipped unless the repository owner explicitly enables and provisions it.
name: Nightly Private Editions

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  edition-pec:
    name: Private enterprise and finance PEC
    if: ${{ vars.DOCMIRROR_PRIVATE_EDITIONS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      # Provision both private packages before enabling the repository variable.
      - name: Verify private edition packages were provisioned
        run: |
          test -f docmirror_enterprise/pyproject.toml
          test -f docmirror_finance/pyproject.toml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install DocMirror and private editions
        run: |
          python -m pip install -e ".[dev,pdf,ocr,table]"
          python -m pip install -e docmirror_enterprise
          python -m pip install -e docmirror_finance
      - name: Validate MEP catalog
        run: python scripts/validate/validate_middleware_catalog.py
      - name: Run private edition integration suites
        run: |
          python -m pytest \
            tests/integration/test_finance_pec.py \
            tests/contract/test_external_plugin_install.py \
            -v --tb=short
