name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Run ruff check
        run: ruff check docmirror/
      - name: Run ruff format check
        run: ruff format --check docmirror/

  hygiene:
    name: Code hygiene audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tools
        run: python -m pip install ruff vulture pyyaml rich
      - name: Run hygiene audit (strict)
        run: |
          python scripts/run_quality_gate.py \
            --profile hygiene \
            --strict \
            --json reports/hygiene_ci.json \
            --markdown reports/hygiene_ci.md \
            --quiet
      - name: Upload hygiene report
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-report
          path: |
            reports/hygiene_ci.json
            reports/hygiene_ci.md

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.12"
            os: macos-latest
          - python-version: "3.12"
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev,pdf]"
      - name: Validate public fixture policy
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python -m pytest tests/contract/test_public_test_fixture_hygiene.py -q
      - name: Validate format capability registry
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_format_capabilities.py
      - name: Validate DTI (business_scene + classification maps)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_dti.py
      - name: Validate middleware catalog (MEP)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_middleware_catalog.py
      - name: Validate post-extract catalog
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_post_extract.py
      - name: Validate TQG manifests
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_test_manifest.py
      - name: Validate clean architecture manifest
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          python scripts/validate/generate_import_linter.py --check
          python scripts/validate/validate_clean_manifest.py
          python scripts/validate/report_clean_quarantine.py --fail-overdue --summary-json reports/clean_quarantine_ci.json
          lint-imports --config .importlinter
      - name: Validate CPA CPS layout (design 12)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_core_cps_layout.py
      - name: Validate core god-file gate (design 12 §7.2)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/validate_core_god_files.py
      - name: vNext removed reference gate
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/gate_vnext_removed_refs.py
      - name: vNext mirror volume gate
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: python scripts/validate/gate_vnext_mirror_volume.py
      - name: Audit core imports (CPA §13)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          python scripts/validate/audit_core_imports.py --json reports/ci_core_import_audit.json
          python -c "import json; r=json.load(open('reports/ci_core_import_audit.json')); assert not r['plugin_forbidden_imports'], r['plugin_forbidden_imports']; assert not r['lazy_hub_present']"
      - name: CCP import-linter contract
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: lint-imports --config .importlinter
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -q
      - name: Run tests (PR tier matrix)
        run: pytest tests/ -v --tb=short --ignore=tests/unit -m "tier_smoke or tier_contract or (tier_regression and not tier_slow)"
      - name: Run tests with coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install pytest-cov
          pytest tests/unit/ -q --cov=docmirror --cov-append
          pytest tests/ --ignore=tests/unit -q --cov=docmirror --cov-append \
            -m "tier_smoke or tier_contract or (tier_regression and not tier_slow)" \
            --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Verify wheel from an isolated working directory
        run: |
          python -m venv "$RUNNER_TEMP/docmirror-build-smoke"
          "$RUNNER_TEMP/docmirror-build-smoke/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/docmirror-build-smoke/bin/python" -c "import docmirror; print(f'docmirror {docmirror.__version__} imports successfully')"
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  oss-release-smoke:
    name: OSS release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build twine pyyaml
      - name: Build package
        run: python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Validate release contract
        run: python scripts/validate/validate_oss_release.py
      - name: Base wheel clean-venv smoke
        run: |
          python -m venv "$RUNNER_TEMP/docmirror-base-smoke"
          "$RUNNER_TEMP/docmirror-base-smoke/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/docmirror-base-smoke/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/docmirror-base-smoke/bin/python" -c "import docmirror; print(docmirror.__version__)"
          "$RUNNER_TEMP/docmirror-base-smoke/bin/docmirror" --help
          "$RUNNER_TEMP/docmirror-base-smoke/bin/docmirror" --version
          "$RUNNER_TEMP/docmirror-base-smoke/bin/docmirror" version
          "$RUNNER_TEMP/docmirror-base-smoke/bin/docmirror" doctor
      - name: Lightweight optional extras smoke
        run: python scripts/validate/smoke_optional_extras.py --timeout 180
