 # GA1.0-ODL-02 Phase 2.2: PDF/UA Compliance Validation
 #
 # Runs on every push to main/dev that touches PDF/UA code.
 # Validates that DocMirror's PDF/UA output passes structural compliance checks.
 #
 # For authoritative validation, veraPDF must be installed (not available on
 # standard GitHub runners). This workflow performs PyMuPDF structural checks
 # as a reliable proxy, and reports PDF/UA version metadata.

 name: Validate PDF/UA Compliance

 on:
   push:
     branches: [main, dev]
     paths:
       - ".github/workflows/validate-pdfua.yml"
       - "docmirror/output/exporters/pdfua*"
       - "docmirror/output/exporters/pdfua/**"
       - "docmirror/cli/pdfua.py"
       - "docmirror/server/api.py"
       - "scripts/validate_pdfua.py"
   pull_request:
     paths:
       - ".github/workflows/validate-pdfua.yml"
       - "docmirror/output/exporters/pdfua*"
       - "docmirror/output/exporters/pdfua/**"
       - "docmirror/cli/pdfua.py"
       - "docmirror/server/api.py"
       - "scripts/validate_pdfua.py"

 jobs:
   validate:
     runs-on: ubuntu-latest
     strategy:
       matrix:
         pdfua-version: ["UA-1", "UA-2"]

     steps:
       - uses: actions/checkout@v4

       - name: Install dependencies
         run: |
           pip install -e ".[pdf,dev]"

       - name: Run PDF/UA unit tests
         run: |
           python -m pytest tests/unit/test_output_pdfua.py -v --tb=short

       - name: Generate test PDF/UA document for validation
         run: |
           python -c "
           from docmirror.output.exporters.pdfua import export_pdfua, PdfUaVersion
           from docmirror.output.dmir import serialize_dmir

           # Build a minimal DMIR dict for a single-page document
           dmir = {
               'dmir_version': '1.0',
               'document': {
                   'type': 'test',
                   'properties': {},
                   'pages': [{
                       'page_number': 1,
                       'width_pt': 595.2,
                       'height_pt': 841.8,
                       'texts': [
                           {'content': 'Test Heading', 'level': 'h1',
                            'reading_order': 0, 'bbox': [50, 30, 500, 60],
                            'evidence_ids': [], 'metadata': {}},
                           {'content': 'This is a test paragraph for PDF/UA validation.',
                            'level': 'body', 'reading_order': 1,
                            'bbox': [50, 80, 500, 120],
                            'evidence_ids': [], 'metadata': {}},
                       ],
                       'tables': [],
                       'key_values': [],
                       'images': [],
                   }],
                   'full_text': 'Test Heading\n\nThis is a test paragraph for PDF/UA validation.',
               },
               'quality': {'confidence': 1.0, 'trust_score': 1.0,
                           'validation_passed': True, 'warnings': []},
               'evidence': {'ledger': {}},
               'meta': {'parser': 'DocMirror', 'version': 'test',
                        'elapsed_ms': 0, 'page_count': 1,
                        'table_count': 0, 'row_count': 0, 'dmir_version': '1.0'},
           }

           version = PdfUaVersion.PDFUA_2 if '${{ matrix.pdfua-version }}' == 'UA-2' else PdfUaVersion.PDFUA_1
           result = export_pdfua(dmir, output_path='/tmp/test_pdfua.pdf',
                                 title='Test Document', language='en-US',
                                 schema_version=version)
           assert result.success, f'Export failed: {result.errors}'
           print(f'PDF/UA-{version.value} export: SUCCESS, {result.page_count} pages, {len(result.warnings)} warnings')
           "

       - name: Validate PDF/UA compliance
         run: |
           python scripts/validate_pdfua.py /tmp/test_pdfua.pdf \
             --version ${{ matrix.pdfua-version }} --json

       - name: Upload validated PDF as artifact
         uses: actions/upload-artifact@v4
         with:
           name: test-pdfua-${{ matrix.pdfua-version }}
           path: /tmp/test_pdfua.pdf
           retention-days: 7

       - name: Report summary
         run: |
           echo "## PDF/UA Compliance Report" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "- **Version**: ${{ matrix.pdfua-version }}" >> $GITHUB_STEP_SUMMARY
           echo "- **PyMuPDF structural check**: ✅" >> $GITHUB_STEP_SUMMARY
           echo "- **Tests**: ✅" >> $GITHUB_STEP_SUMMARY
           echo "" >> $GITHUB_STEP_SUMMARY
           echo "_For authoritative validation, install veraPDF locally._" >> $GITHUB_STEP_SUMMARY
