name: Nightly Public Golden

on:
  schedule:
    - cron: "0 18 * * *"  # 02:00 CST
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-public-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  public-extract-smoke:
    name: Public synthetic extract smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with public test dependencies
        run: python -m pip install -e ".[dev,pdf]"
      - name: Validate middleware catalog
        run: python scripts/validate/validate_middleware_catalog.py
      - name: Run generated-public-fixture extraction gates
        run: |
          python -m pytest \
            tests/unit/test_extraction_profile.py::test_full_page_segmentation_bbox_covers_page \
            tests/unit/test_extraction_profile.py::test_engine_profile_disables_pymupdf_on_wechat_page \
            tests/integration/test_extract_golden.py \
            -v --tb=short

  public-structure-golden:
    name: Public structure and finance golden
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate committed public fixtures and goldens
        run: |
          python -m pytest \
            tests/contract/test_public_test_fixture_hygiene.py \
            tests/contract/test_vnext_page_projection_contract.py \
            tests/unit/test_field_grid_full_page_layout.py \
            tests/unit/test_vnext_finance_golden.py \
            -v --tb=short

  udtr-metadata-golden:
    name: Public UDTR manifest validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate metadata-only manifests
        run: |
          python scripts/validate/validate_udtr_golden.py tests/golden/udtr/manifest.example.json
          python scripts/validate/run_udtr_cross_format_matrix.py \
            tests/golden/udtr/cross_format_real_manifest.example.json \
            --summary-json reports/udtr_public_metadata.json
      - name: Upload public UDTR summary
        uses: actions/upload-artifact@v4
        with:
          name: udtr-public-metadata
          path: reports/udtr_public_metadata.json
          if-no-files-found: error

  dti-validate:
    name: DTI SSOT validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Validate DTI maps
        run: python scripts/validate/validate_dti.py

  mep-anomaly-smoke:
    name: AnomalyDetector public smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Resolver includes AnomalyDetector when enabled
        run: |
          DOCMIRROR_ENABLE_ANOMALY=1 python -c "
          from docmirror.configs.middleware.resolver import resolve_pipeline
          from docmirror.models.entities.parse_result import DocumentEntities, PageContent, ParseResult, ResultStatus
          pr = ParseResult(status=ResultStatus.SUCCESS, pages=[PageContent(page_number=1)])
          pr.entities = DocumentEntities()
          names = resolve_pipeline('fixed_layout_rasterizable', 'full', pr)
          assert 'AnomalyDetector' in names, names
          print('AnomalyDetector enabled OK')
          "
