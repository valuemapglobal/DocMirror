name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  actions: read

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  release-gate:
    name: Verify release identity and policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read package version
        id: release_version
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Verify tag, package version, and main commit
        env:
          PACKAGE_VERSION: ${{ steps.release_version.outputs.package_version }}
        run: |
          test "$GITHUB_REF_NAME" = "v${PACKAGE_VERSION}" || {
            echo "Release tag $GITHUB_REF_NAME must equal v${PACKAGE_VERSION}" >&2
            exit 1
          }
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" || {
            echo "Release tag must point to the current main commit" >&2
            exit 1
          }
      - name: Verify current main CI for the owner-approved 1.0.8 release
        if: steps.release_version.outputs.package_version == '1.0.8'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate/validate_release_commit_ci.py
      - name: Verify 14 complete UTC days of green main CI
        if: steps.release_version.outputs.package_version != '1.0.8'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate/validate_ci_green_window.py --min-days 14

  publish:
    name: Build and publish to PyPI
    needs: release-gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine pyyaml

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution metadata and release contract
        run: |
          python -m twine check dist/*
          python -m pip install dist/*.whl
          python scripts/validate/validate_oss_release.py

      - name: Verify wheel from an isolated working directory
        run: |
          EXPECTED_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          python -m venv "$RUNNER_TEMP/docmirror-publish-smoke"
          "$RUNNER_TEMP/docmirror-publish-smoke/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          EXPECTED_VERSION="$EXPECTED_VERSION" "$RUNNER_TEMP/docmirror-publish-smoke/bin/python" -c "import os, docmirror; assert docmirror.__version__ == os.environ['EXPECTED_VERSION']; print(f'docmirror {docmirror.__version__} installed')"
          "$RUNNER_TEMP/docmirror-publish-smoke/bin/docmirror" --help
          "$RUNNER_TEMP/docmirror-publish-smoke/bin/docmirror" --version
          "$RUNNER_TEMP/docmirror-publish-smoke/bin/docmirror" doctor

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
