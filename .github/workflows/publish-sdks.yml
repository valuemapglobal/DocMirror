name: Build SDK Previews

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  generate-openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[server]"

      - name: Extract OpenAPI spec
        run: |
          python scripts/generate_openapi.py docs/openapi/openapi.json

      - name: Upload OpenAPI spec as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/openapi.json

  publish-dmir-schema:
    name: Build DMIR schema preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Copy versioned DMIR schema for release
        run: |
          SCHEMA_DIR="docmirror/configs/schemas"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          cp "$SCHEMA_DIR/mirror.schema.json" "$SCHEMA_DIR/mirror.v1.0.release.schema.json"
          echo "Schema prepared for release ${RELEASE_TAG}"

      - name: Upload DMIR schema as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmir-schema
          path: docmirror/configs/schemas/*.schema.json


  generate-typescript:
    name: Build TypeScript SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/

      - name: Generate TypeScript SDK
        run: |
          cd sdks/typescript
          npm ci
          npm run generate
          npm run build

      - name: Upload TypeScript preview
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-preview
          path: sdks/typescript/dist/
          if-no-files-found: error

  generate-go:
    name: Build Go SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/

      - name: Generate Go SDK
        run: |
          go install github.com/deepmap/oapi-codegen/v2/cmd/oapi-codegen@latest
          mkdir -p sdks/go
          oapi-codegen -package docmirror -generate client,types \
            docs/openapi/openapi.json > sdks/go/client.go

      - name: Upload Go preview
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk-preview
          path: sdks/go/client.go
          if-no-files-found: error

  generate-java:
    name: Build Java SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/

      - name: Generate Java SDK
        run: |
          docker run --rm -v $(pwd):/local openapitools/openapi-generator-cli generate \
            -i /local/docs/openapi/openapi.json \
            -g java \
            -o /local/sdks/java/

      - name: Upload Java preview
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk-preview
          path: sdks/java/
          if-no-files-found: error
