name: Build SDK Previews

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-sdks.yml"
      - "scripts/generate_openapi.py"
      - "docmirror/server/**"
      - "sdks/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/publish-sdks.yml"
      - "scripts/generate_openapi.py"
      - "docmirror/server/**"
      - "sdks/**"

permissions:
  contents: read

concurrency:
  group: sdk-previews-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PIP_CONSTRAINT: .github/constraints/ci.txt
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  generate-openapi:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[server]"

      - name: Extract OpenAPI spec
        run: |
          python scripts/generate_openapi.py docs/openapi/openapi.json

      - name: Upload OpenAPI spec as artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/openapi.json

  publish-dmir-schema:
    name: Build DMIR schema preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Copy versioned DMIR schema for release
        run: |
          SCHEMA_DIR="docmirror/configs/schemas"
          RELEASE_TAG="${GITHUB_REF_NAME}"
          cp "$SCHEMA_DIR/mirror.schema.json" "$SCHEMA_DIR/mirror.v1.0.release.schema.json"
          echo "Schema prepared for release ${RELEASE_TAG}"

      - name: Upload DMIR schema as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmir-schema
          path: docmirror/configs/schemas/*.schema.json


  generate-typescript:
    name: Build TypeScript SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: docs/openapi/

      - name: Build TypeScript SDK preview
        working-directory: sdks/typescript
        run: |
          npm ci
          npm run generate
          npm run build
          npm run typecheck
          npm pack --dry-run

      - name: Upload TypeScript preview
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-preview
          path: sdks/typescript/dist/
          if-no-files-found: error

  generate-go:
    name: Build Go SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Build Go SDK preview
        working-directory: sdks/go
        run: |
          UNFORMATTED=$(gofmt -l .)
          test -z "$UNFORMATTED" || {
            echo "Go files require gofmt:" >&2
            echo "$UNFORMATTED" >&2
            exit 1
          }
          go test ./...
          go vet ./...

      - name: Upload Go preview
        uses: actions/upload-artifact@v4
        with:
          name: go-sdk-preview
          path: |
            sdks/go/*.go
            sdks/go/go.mod
            sdks/go/README.md
          if-no-files-found: error

  generate-java:
    name: Build Java SDK preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java SDK preview
        working-directory: sdks/java
        run: mvn -B -ntp verify

      - name: Upload Java preview
        uses: actions/upload-artifact@v4
        with:
          name: java-sdk-preview
          path: sdks/java/target/*.jar
          if-no-files-found: error

  build-mcp-server:
    name: Build MCP server preview
    needs: generate-openapi
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdks/mcp-server/package-lock.json

      - name: Build MCP server preview
        working-directory: sdks/mcp-server
        run: |
          npm ci
          npm run build
          npm pack --dry-run

      - name: Upload MCP server preview
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-preview
          path: sdks/mcp-server/dist/
          if-no-files-found: error
