name: Benchmark Regression Alert

on:
  push:
    branches: [main, dev]
    paths:
      - "docmirror/**"
      - "docs/benchmarks/golden-matrix.json"

jobs:
  check-regression:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -e ".[all]"

      - name: Run benchmark matrix
        run: |
          python -m docmirror.eval.benchmark_runner \
            --matrix docs/benchmarks/golden-matrix.json \
            --output docs/benchmarks/results/

      - name: Compare with latest release manifest
        run: |
          python scripts/compare_benchmark_regression.py \
            --current docs/benchmarks/results/latest.json \
            --baseline docs/benchmarks/results/baseline.json \
            --threshold 0.01 \
            --output docs/benchmarks/regression-report.md

      - name: Upload regression report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report
          path: docs/benchmarks/regression-report.md

      - name: Comment on PR if regression found
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('docs/benchmarks/regression-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Benchmark Regression Detected\n\n${report}\n\nPlease review the changes and verify the regression is expected.`
            });
