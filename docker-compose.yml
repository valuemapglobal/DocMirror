services:
  docmirror:
    build:
      context: .
      dockerfile: Dockerfile
    image: docmirror:latest
    container_name: docmirror_engine
    ports:
      - "8000:8000"
    volumes:
      # Map host cache to container to prevent redownloading ONNX models every time
      - ./model_cache:/root/.cache
    environment:
      # Optional: Enable full enhancement mode for parsing
      - DOCMIRROR_ENHANCE_MODE=standard
      # Optional: Control concurrency
      - OMP_NUM_THREADS=4
      # Optional: API authentication key
      # - DOCMIRROR_API_KEY=your-secret-key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Optional: If you intend to run GPU-accelerated OCR in the future
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
