version: 1
layers:
  input:
    paths:
    - docmirror/input/**
    import_linter_allow_indirect: true
    forbidden_imports:
    - docmirror.server
    - docmirror.cli
    - docmirror.sdk
  output:
    paths:
    - docmirror/output/**
    import_linter_allow_indirect: true
    forbidden_imports:
    - docmirror.server
    - docmirror.cli
    - docmirror.sdk
  framework:
    paths:
    - docmirror/framework/**
  plugins:
    paths:
    - docmirror/plugins/**
    import_linter_allow_indirect: true
    forbidden_imports:
    - docmirror.input.extraction.extractor
    - docmirror.layout.segment.zones
    - docmirror.tables.engine
    - docmirror.ocr.fallback
    - docmirror.server
    - docmirror.cli
  runtime:
    paths:
    - docmirror/runtime/**
  cli:
    paths:
    - docmirror/cli/**
  server:
    paths:
    - docmirror/server/**
  models:
    paths:
    - docmirror/models/**
    import_linter_allow_indirect: true
    forbidden_imports:
    - docmirror.input
    - docmirror.output
    - docmirror.server
    - docmirror.cli
    - docmirror.plugins
    import_linter_ignore_imports:
    - importer: docmirror.models.mirror.serialization_contract
      imported: docmirror.evidence.structure_provenance
      reason: Serialization contract still includes structure provenance snapshot.
      review_by: '2026-08-01'
    - importer: docmirror.models.mirror.serialization_contract
      imported: docmirror.tables.compose.ledger_quality
      reason: Serialization contract still exports table ledger quality metadata.
      review_by: '2026-08-01'
    - importer: docmirror.models.mirror.serialization_contract
      imported: docmirror.layout.vocabulary
      reason: Serialization contract still normalizes vocabulary through structure utilities.
      review_by: '2026-08-01'
external_modules:
- regex: ^pydantic\.*
- regex: ^typing\.*
- regex: ^(pathlib|os|sys|re|json|abc|enum|functools|itertools|collections|dataclasses|datetime|types|logging|warnings|inspect|copy|math|csv|hashlib|uuid|textwrap|shutil|tempfile|html)\.*
- regex: ^numpy\.*
- regex: ^PIL\.*
- regex: ^yaml\.*
- regex: ^rich\.*
- regex: ^importlib\.*
public_modules:
- module: docmirror
  reason: Public Python API.
- module: docmirror.__main__
  reason: python -m docmirror entry point.
- module: docmirror.cli.main
  reason: Console script entry point.
- module: docmirror.server.api
  reason: FastAPI serving boundary.
- module: docmirror.server.mcp
  reason: MCP serving boundary.
- module: docmirror.plugins
  reason: Public plugin registry API.
dynamic_modules:
- module: docmirror.input.adapters.ai.backends.openai
  source: docmirror/input/adapters/ai/__init__.py
- module: docmirror.input.adapters.ai.backends.gemini
  source: docmirror/input/adapters/ai/__init__.py
compatibility_modules: []
removed_modules:
- module: docmirror.models.entities.document_type
  replacement: Core-owned canonical field_schema resources
- module: docmirror.models.edition_serializer
  replacement: docmirror.plugin_api.EditionProjector
- module: docmirror.plugins._base.dec_builder
  replacement: post-seal projector-local ProjectionData
- module: docmirror.plugins._base.table_dec
  replacement: post-seal projector-local ProjectionData
- module: docmirror.core
  replacement: docmirror.layout
- module: docmirror.structure
  replacement: docmirror.layout
- module: docmirror.adapters
  replacement: docmirror.input.adapters
- module: docmirror.middlewares
  replacement: docmirror.framework.middlewares
- module: docmirror.exporters
  replacement: docmirror.output.exporters
- module: docmirror.integration
  replacement: docmirror.sdk.integration
- module: docmirror.deployment
  replacement: docmirror.server
- module: docmirror.di
  replacement: docmirror.framework.di
- module: docmirror.plugins.runner
  replacement: unified Post-Seal PluginRegistry
- module: docmirror.plugins.licensing
  replacement: docmirror.plugins._runtime.licensing
- module: docmirror.plugins.post_extract
  replacement: docmirror.plugin_api.EditionProjector through PluginRegistry
- module: docmirror.server.output_selection
  replacement: fixed delivery contract in docmirror.server.output_builder
- module: docmirror.configs.output_profile
  replacement: fixed standard production projection
- module: docmirror.runtime.profiles
  replacement: call-scoped runtime controls without output selection
- module: docmirror.framework.edition_defaults
  replacement: commercial projectors enforce their own availability boundary
- module: docmirror.framework.delivery_contract
  replacement: commercial projectors enforce their own availability boundary
- module: docmirror.server.edition_access
  replacement: sealed ParseResult sections and trust facts
- module: docmirror.models.semantic_store
  replacement: sealed ParseResult SSOT
- module: docmirror.topology.document_graph
  replacement: canonical topology and docmirror.models.mirror.document_structure
- module: docmirror.domains
  replacement: plugin-owned semantic solvers under docmirror.plugins
- module: docmirror.errors
  replacement: docmirror.sdk.integration.errors and docmirror.configs.failure_codes
- module: docmirror.cli.explainability_commands
  replacement: no active CLI command
- module: docmirror.ocr.correction.report
  replacement: no active OCR reporting path
quarantine_modules: []
