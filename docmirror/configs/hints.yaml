# =============================================================================
# DocMirror Business Rule Configuration (hints.yaml)
# =============================================================================
#
# Centralizes domain-specific parsing rules that were previously scattered
# across 200+ plugin files in v1. Supports hot-reload — changes take effect
# without restarting the service.
#
# Sections:
#   scenes             — Institution/domain-specific scene definitions with
#                         keywords, column maps, and validation rules.
#   column_aliases     — Additional column name aliases (supplements
#                         the main column_aliases.yaml).
#   institution_hints  — Per-institution fine-tuning overrides.

# ── Scene Definitions ──
# Each scene represents a known document template (e.g., a specific bank's
# statement format). The SceneDetector matches keywords against document text
# to select the best-fitting scene, then the ColumnMapper uses the scene's
# column_map for precise header-to-standard-name mapping.
scenes:
  - name: cmb_bank_statement
    display_name: 招行流水
    keywords: ["招商银行", "交易明细"]
    column_map:
      "交易日": {standard_name: "交易时间", type: "date"}
      "摘要": {standard_name: "摘要", type: "string"}
      "人民币": {standard_name: "交易金额", type: "number"}
      "结余": {standard_name: "账户余额", type: "number"}
    validation_rules:
      - {field: "交易金额", rule: "not_null"}
      - {field: "交易时间", rule: "date_format"}

  - name: ccb_bank_statement
    display_name: 建行流水
    keywords: ["中国建设银行"]
    column_map:
      "交易日期": {standard_name: "交易时间", type: "date"}
      "摘要": {standard_name: "摘要", type: "string"}
      "交易金额": {standard_name: "交易金额", type: "number"}
      "账户余额": {standard_name: "账户余额", type: "number"}
      "对方户名": {standard_name: "对方账号与户名", type: "string"}

  - name: icbc_bank_statement
    display_name: 工行流水
    keywords: ["中国工商银行"]
    column_map:
      "日期": {standard_name: "交易时间", type: "date"}
      "摘要": {standard_name: "摘要", type: "string"}
      # ICBC uses separate debit/credit columns with sign indicators
      "借方发生额": {standard_name: "交易金额", type: "number", sign: "negative"}
      "贷方发生额": {standard_name: "交易金额", type: "number", sign: "positive"}
      "余额": {standard_name: "账户余额", type: "number"}

  - name: abc_bank_statement
    display_name: 农行流水
    keywords: ["中国农业银行"]
    column_map:
      "交易日期": {standard_name: "交易时间", type: "date"}
      "交易摘要": {standard_name: "摘要", type: "string"}
      "交易金额（元）": {standard_name: "交易金额", type: "number"}
      "余额（元）": {standard_name: "账户余额", type: "number"}

  - name: generic_invoice
    display_name: 通用发票
    keywords: ["增值税", "发票"]
    column_map:
      "品名": {standard_name: "item_name", type: "string"}
      "数量": {standard_name: "quantity", type: "number"}
      "单价": {standard_name: "unit_price", type: "number"}
      "金额": {standard_name: "amount", type: "number"}
      "税率": {standard_name: "tax_rate", type: "string"}

# ── Extended Column Aliases ──
# Supplements the main column_aliases.yaml with additional alias mappings.
# These are merged at runtime by the ColumnMapper.
column_aliases:
  交易时间:
    - "记账日"
    - "值日"
    - "入账时间"
  交易金额:
    - "发生金额"
    - "交易额(元)"
  账户余额:
    - "账面余额"
    - "卡余额"

# ── Institution-Level Fine-Tuning ──
# Per-institution overrides that adjust parsing behavior without creating
# separate scene definitions. These replace the legacy plugin system.
institution_hints:
  citic:
    date_format: "YYYYMMDD"
    amount_sign_rule: "split"  # Income/expense in separate columns
    special_columns: ["Account SeqNo", "Inquiry period"]
  pab:
    date_format: "YYYY-MM-DD HH:MM:SS"
    amount_sign_rule: "standard"
