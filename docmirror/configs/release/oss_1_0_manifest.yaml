version: "1.1.2"
position:
  category: "Commercial Document Trust Layer"
  tagline: "Parse. Prove. Trust."
  forbidden_primary_phrases:
    - "Universal Document Parser"
    - "Universal Document Parsing Engine"
    - "LLM-ready structured data"
    - "RAG pipelines"
install_contract:
  base_commands:
    - ["python", "-c", "import docmirror; print(docmirror.__version__)"]
    - ["docmirror", "--help"]
    - ["docmirror", "--version"]
    - ["docmirror", "doctor"]
  public_all_extra_members:
    - pdf
    - pdfua
    - ocr
    - layout
    - table
    - formula
    - office
    - security
    - langdetect
    - server
    - archive
    - langchain
    - llamaindex
    - haystack
    - projection
    - mcp
    - plugins
    - ai
    - ocr-tesseract
  lightweight_extra_smoke:
    - plugins
    - projection
    - archive
    - langdetect
  public_all_must_not_include:
    - "docmirror-enterprise"
    - "docmirror-finance"
required_public_files:
  - README.md
  - README_zh-CN.md
  - LICENSE
  - CHANGELOG.md
  - SECURITY.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
wheel_forbidden_paths:
  - ".env"
  - ".env.example"
  - ".github/"
  - ".import_linter_cache/"
  - "Dockerfile"
  - "artifacts/"
  - "docker-compose.yml"
  - "docmirror/plugins/.plugin_state.json"
  - "docmirror_enterprise/"
  - "docmirror_finance/"
  - "docs/"
  - "docs/design/"
  - "examples/"
  - "mkdocs.yml"
  - "output/"
  - "reports/"
  - "scripts/"
  - "sdks/"
  - "tests/"
