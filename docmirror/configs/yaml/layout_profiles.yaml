# Layout profiles — document-scoped extraction hints (EFPA)
# Auto match: specific profiles first, then generic fallback.

profiles:
  generic:
    force_cross_page_merge: true
    mirror_skip_cross_page_merge: false
    sidebar_x_ratio: null
    preferred_table_methods: []
    disabled_table_methods: []

  credit_report_section_dominant:
    inherits: generic
    document_type_hint: credit_report
    # Routing: SSO/layout profile selection → section-dominant document shape
    mirror_skip_cross_page_merge: true
    match:
      text_any:
        - "个人信用报告"
        - "企业信用报告"
      scene_hint: credit_report

  borderless_ledger_wechat:
    inherits: generic
    document_type_hint: wechat_payment
    segmentation_mode: full_page_table
    sidebar_x_ratio: 0.72
    force_cross_page_merge: true
    mirror_skip_cross_page_merge: false
    min_confidence_to_accept: 0.85
    enable_best_candidate_selection: true
    bcs_oracle_layer: pdfplumber_default
    normalize_intracellular_newlines: true
    collapse_duplicate_spaces: true
    skip_pid_resample: true
    enable_grid_template: true
    enable_global_grid_tensor: false
    # Ledger profiles: ledger hook ONLY (generic hook drops ~1 row/page — see design-12 P6-bench RCA)
    table_normalize_hooks:
      - ledger_borderless
    use_tnp_staged: true
    ocr_column_aware: false
    merge_quarantine_on_col_mismatch: true
    disabled_table_methods:
      - pymupdf_native
    preferred_table_methods:
      - pdfplumber_default
      - char_strategy
      - pipe_delimited
      - signal_processor
    expected_header_columns:
      - 交易单号
      - 交易时间
      - 交易类型
      - 收/支/其他
      - 交易方式
      - 金额(元)
      - 交易对方
      - 商户单号
    match:
      text_any:
        - 微信支付交易明细证明
        - 财付通
      min_pages: 10

  borderless_ledger_alipay:
    inherits: borderless_ledger_wechat
    document_type_hint: alipay_payment
    match:
      text_any:
        - 支付宝
        - 蚂蚁集团
      min_pages: 3

  borderless_ledger_bank:
    inherits: generic
    document_type_hint: bank_statement
    segmentation_mode: full_page_table
    sidebar_x_ratio: null
    force_cross_page_merge: true
    mirror_skip_cross_page_merge: false
    min_confidence_to_accept: 0.85
    enable_best_candidate_selection: true
    bcs_oracle_layer: pdfplumber_default
    normalize_intracellular_newlines: true
    collapse_duplicate_spaces: true
    skip_pid_resample: true
    enable_grid_template: true
    use_tnp_staged: true
    merge_quarantine_on_col_mismatch: true
    table_normalize_hooks:
      - ledger_borderless
    disabled_table_methods:
      - pymupdf_native
    preferred_table_methods:
      - pdfplumber_default
      - char_strategy
      - pipe_delimited
      - lines
    expected_header_columns:
      - 交易日期
      - 摘要
      - 借方发生额
      - 贷方发生额
      - 余额
      - 对方户名
    match:
      text_any:
        - 个人客户交易明细
        - 企业客户交易明细
        - 账户明细信息
        - 中国建设银行账户明细
        - 交易明细清单
        - 活期交易明细
      min_pages: 1
    header_aliases:
      交易时间:
        - 记账日
        - 值日
        - 入账时间
        - 交易日期
        - 日期
        - 交易日
      交易金额:
        - 发生金额
        - 交易额(元)
      账户余额:
        - 账面余额
        - 卡余额
        - 结余
        - 余额（元）
        - 余额
      摘要:
        - 交易摘要
      对方账号与户名:
        - 对方户名
    institution_variants:
      - id: cmb
        display_name: 招行流水
        keywords: ["招商银行", "交易明细"]
        column_map:
          交易日: 交易时间
          人民币: 交易金额
          结余: 账户余额
      - id: ccb
        display_name: 建行流水
        keywords: ["中国建设银行"]
        column_map:
          交易日期: 交易时间
          对方户名: 对方账号与户名
      - id: icbc
        display_name: 工行流水
        keywords: ["中国工商银行"]
        column_map:
          日期: 交易时间
          借方发生额: 交易金额
          贷方发生额: 交易金额
          余额: 账户余额
        amount_sign_rule: split
      - id: abc
        display_name: 农行流水
        keywords: ["中国农业银行"]
        column_map:
          交易日期: 交易时间
          交易摘要: 摘要
          交易金额（元）: 交易金额
          余额（元）: 账户余额
      - id: citic
        display_name: 中信银行
        keywords: ["中信银行"]
        date_format: YYYYMMDD
        amount_sign_rule: split
      - id: boc
        display_name: 中国银行
        keywords: ["中国银行", "Bank of China"]
        column_map:
          记账日: 交易日期
          起息日: 起息日
          备注: 对方户名
        amount_sign_rule: split
      - id: pab
        display_name: 平安银行
        keywords: ["平安银行"]
        date_format: "YYYY-MM-DD HH:MM:SS"
        amount_sign_rule: standard
      - id: jsb
        display_name: 江苏银行
        keywords: ["江苏银行"]
        column_map:
          借方发生额: 交易金额
          贷方发生额: 交易金额
