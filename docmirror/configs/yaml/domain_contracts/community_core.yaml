# Domain GA Contract (DGAC) — Community Core 6+1
# Single source of truth for P0 domain commitments.
# Read by scripts/validate/validate_domain_ga_contracts.py and scripts/sync/compile_dgc_status.py.

version: 1
edition: community
contract_name: community_core_domains_6_plus_1

# ── field_level definitions ──
#   required:      missing → domain success impossible
#   required_any:  ≥1 of the set must be present
#   record_required: every logical record SHOULD carry this field
#   conditional:   present only for certain document styles
#   derived:       computed from source fields; must declare derivation
#   quality:       does not enter business fields but affects ingestability
#   optional:      nice-to-have; absence does not block GA

domains:
  # ─────────────────────────────────────────────────────────────
  # generic — safety net for unknown / unclassified documents
  # ─────────────────────────────────────────────────────────────
  generic:
    public_route: generic_fallback
    support_level: L1
    domain_contract_version: generic.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        optional:
          - discovered_key_values
          - high_confidence_entities
      records:
        optional:
          - logical_table_records
          - physical_table_records
      failure:
        empty_input: empty_input
        low_quality: partial_low_confidence
        unsupported: unsupported_variant
      special:
        - must_never_pretend_core_domain
        - support_level_must_match_dgc_l1
    gates:
      classify: domain.generic.classify
      extract: domain.generic.extract
      edition_schema: domain.generic.edition_schema
      evidence: domain.generic.evidence
      failure: domain.generic.failure
      fixtures: domain.generic.fixtures

  # ─────────────────────────────────────────────────────────────
  # bank_statement
  # ─────────────────────────────────────────────────────────────
  bank_statement:
    public_route: core_domain
    support_level: L2
    domain_contract_version: bank_statement.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        required_any:
          - account_holder
          - account_number
          - bank_name
        optional:
          - query_period
          - currency
      records:
        required:
          - transaction_date
          - amount
        conditional:
          - balance
          - counter_party
          - counter_account
          - summary
      quality:
        - table_quality
        - row_count
        - amount_parse_rate
        - balance_continuity
        - anomaly_flags
      failure:
        empty_input: empty_input
        missing_header: partial_missing_required
        missing_amount_column: partial_missing_required
        low_ocr_quality: low_quality_input
    gates:
      classify: domain.bank_statement.classify
      extract: domain.bank_statement.extract
      edition_schema: domain.bank_statement.edition_schema
      evidence: domain.bank_statement.evidence
      failure: domain.bank_statement.failure
      fixtures: domain.bank_statement.fixtures

  # ─────────────────────────────────────────────────────────────
  # wechat_payment
  # ─────────────────────────────────────────────────────────────
  wechat_payment:
    public_route: core_domain
    support_level: L2
    domain_contract_version: wechat_payment.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        optional:
          - account_holder
          - account_number
          - query_period
          - currency
      records:
        required:
          - trade_no
          - timestamp
          - amount
        conditional:
          - counter_party
          - transaction_type
          - direction
      quality:
        - primary_logical_rows
        - column_fidelity
        - quarantine_pages
        - drift_ratio
      failure:
        empty_input: empty_input
        quarantine_not_lost: partial_quarantine
        column_mismatch: partial_column_mismatch
        low_ocr_quality: low_quality_input
    gates:
      classify: domain.wechat_payment.classify
      extract: domain.wechat_payment.extract
      edition_schema: domain.wechat_payment.edition_schema
      evidence: domain.wechat_payment.evidence
      failure: domain.wechat_payment.failure
      fixtures: domain.wechat_payment.fixtures

  # ─────────────────────────────────────────────────────────────
  # alipay_payment
  # ─────────────────────────────────────────────────────────────
  alipay_payment:
    public_route: core_domain
    support_level: L2
    domain_contract_version: alipay_payment.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        optional:
          - account_holder
          - account_number
          - query_period
          - currency
      records:
        required:
          - trade_no
          - timestamp
          - amount
        conditional:
          - merchant_no
          - counter_party
          - payment_method
          - direction
      quality:
        - normalized_time_rate
        - normalized_amount_rate
        - logical_row_count
        - bad_timestamp_ratio
      failure:
        empty_input: empty_input
        time_normalization_failed: partial_with_raw
        amount_normalization_failed: partial_with_raw
    gates:
      classify: domain.alipay_payment.classify
      extract: domain.alipay_payment.extract
      edition_schema: domain.alipay_payment.edition_schema
      evidence: domain.alipay_payment.evidence
      failure: domain.alipay_payment.failure
      fixtures: domain.alipay_payment.fixtures

  # ─────────────────────────────────────────────────────────────
  # vat_invoice
  # ─────────────────────────────────────────────────────────────
  vat_invoice:
    public_route: core_domain
    support_level: L2
    domain_contract_version: vat_invoice.community.v1
    dgc_status_source: manual_target
    target_status: candidate
    p0_commitment:
      fields:
        required:
          - invoice_number
          - total_amount
        conditional:
          - invoice_code
          - buyer_name
          - seller_name
          - amount_without_tax
          - tax_amount
          - invoice_date
      records:
        conditional:
          - line_items
      quality:
        - code_number_validity
        - amount_consistency
        - tax_consistency
      failure:
        empty_input: empty_input
        amount_inconsistent: partial_amount_mismatch
        low_quality: low_quality_input
    gates:
      classify: domain.vat_invoice.classify
      extract: domain.vat_invoice.extract
      edition_schema: domain.vat_invoice.edition_schema
      evidence: domain.vat_invoice.evidence
      failure: domain.vat_invoice.failure
      fixtures: domain.vat_invoice.fixtures

  # ─────────────────────────────────────────────────────────────
  # business_license
  # ─────────────────────────────────────────────────────────────
  business_license:
    public_route: core_domain
    support_level: L2
    domain_contract_version: business_license.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        required:
          - company_name
          - unified_social_credit_code
          - legal_representative
        conditional:
          - registered_capital
          - business_term
        optional:
          - date_of_establishment
          - address
      sections:
        conditional:
          - business_scope
      quality:
        - uscc_checksum
        - field_presence
        - low_quality_ocr_pages
      failure:
        empty_input: empty_input
        uscc_checksum_invalid: partial_with_warning
        missing_required_field: partial_missing_required
    gates:
      classify: domain.business_license.classify
      extract: domain.business_license.extract
      edition_schema: domain.business_license.edition_schema
      evidence: domain.business_license.evidence
      failure: domain.business_license.failure
      fixtures: domain.business_license.fixtures

  # ─────────────────────────────────────────────────────────────
  # credit_report
  # ─────────────────────────────────────────────────────────────
  credit_report:
    public_route: core_domain
    support_level: L2
    domain_contract_version: credit_report.community.v1
    dgc_status_source: computed
    p0_commitment:
      fields:
        required:
          - subject_name
          - id_number
        conditional:
          - report_time
          - report_number
      records:
        conditional:
          - credit_accounts
          - repayment_records
          - overdue_records
          - inquiry_records
      sections:
        required:
          - accounts
          - credit_lines
          - repayments
          - overdue
        conditional:
          - inquiries
          - public_records
      quality:
        - section_coverage
        - account_count_consistency
        - overdue_detection_confidence
      failure:
        empty_input: empty_input
        scanned_low_quality: partial_sections_with_retry
        missing_section: partial_missing_section
    gates:
      classify: domain.credit_report.classify
      extract: domain.credit_report.extract
      edition_schema: domain.credit_report.edition_schema
      evidence: domain.credit_report.evidence
      failure: domain.credit_report.failure
      fixtures: domain.credit_report.fixtures

# ── failure taxonomy (shared across domains) ──
failure_taxonomy:
  success:
    description: "P0 fields/records meet gate; domain contract passes"
  partial_low_confidence:
    description: "Results exist but confidence is low; mark needs_review"
  partial_missing_required:
    description: "P0 fields missing; output extracted results + missing_fields list"
  unsupported_variant:
    description: "Belongs to domain but style unsupported; output Mirror/Evidence + unsupported_reason"
  empty_input:
    description: "No parseable facts; stable error envelope, no empty-success JSON"
  low_quality_input:
    description: "OCR/scan quality insufficient; affected_pages + retry suggestion + needs_review"
  domain_mismatch:
    description: "Classification vs plugin mismatch; fallback to generic or mirror-only explicitly"
  plugin_error:
    description: "Plugin exception; no traceback exposed; partial/mirror + error_code"
  fallback_generic:
    description: "Core domain failed; enters generic fallback with fallback_from_domain + fallback_reason"

# ── evidence binding policy ──
evidence_policy:
  required_for_p0: true
  acceptable_states:
    - with_bbox_and_source_ref
    - with_source_text_or_cell_ref_only
    - needs_evidence  # P0 cannot stay here long-term
