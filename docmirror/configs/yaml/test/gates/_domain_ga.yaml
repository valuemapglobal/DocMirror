  alipay_payment:
    easy:
    - tests/fixtures/alipay_payment/黄照荣+支付宝流水.pdf
    medium:
    - tests/fixtures/alipay_payment/黄照荣+支付宝流水_cleaned.pdf
    broken:
    - tests/fixtures-private/broken/broken_alipay_payment_placeholder.gitkeep
    low_quality:
    - tests/fixtures-private/low_quality/low_quality_alipay_payment_placeholder.gitkeep
    edge_case:
    - tests/fixtures-private/edge_case/edge_case_alipay_payment_placeholder.gitkeep
  business_license:
    easy:
    - tests/fixtures/business_license/synthetic_medium_variant.pdf
    medium: null
    broken:
    - tests/fixtures-private/broken/broken_business_license_placeholder.gitkeep
    low_quality:
    - tests/fixtures-private/low_quality/low_quality_business_license_placeholder.gitkeep
    edge_case:
