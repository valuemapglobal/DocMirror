  vat_invoice: null
  generic: null
fixture_matrix:
  easy:
    description: Clean, standard-format document; P0 happy path
  medium:
    description: Slight variations in format/layout
  hard:
    description: Significant layout departures; edge cases
  broken:
    description: Damaged scans, missing pages
  low_quality:
    description: Low DPI, blurry, or heavy noise
  edge_case:
    description: Unusual but valid document variant
