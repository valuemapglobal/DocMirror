# TQG extract track — GATE_PROFILES + integration golden cases
version: 1
track: extract
layer: epo

profiles:
  generic:
    profile_id: generic
    min_char_preservation: 0.90
    min_reading_order: 0.70
    min_transaction_rows: 0
    min_table_count: 0
    max_empty_row_ratio: 0.50
    expected_merged_table: false
    min_merge_confidence: 0.65
    min_row_preservation_ratio: 0.0
    min_logical_rows: 0
    max_logical_rows: 0
    oracle_mode: none
    oracle_sample_pages: 3

  alipay_payment:
    profile_id: alipay_payment
    min_char_preservation: 0.99
    min_transaction_rows: 10
    min_table_count: 1
    max_empty_row_ratio: 0.30
    expected_merged_table: true
    min_logical_rows: 1400
    oracle_mode: none

  wechat_payment:
    profile_id: wechat_payment
    min_char_preservation: 0.99
    min_transaction_rows: 10
    min_table_count: 1
    max_empty_row_ratio: 0.30
    expected_merged_table: true
    min_row_preservation_ratio: 0.995
    min_logical_rows: 5111
    max_logical_rows: 5111
    oracle_mode: pdfplumber_full_page_sample
    oracle_sample_pages: 3

  bank_statement:
    profile_id: bank_statement
    min_char_preservation: 0.95
    min_transaction_rows: 3
    oracle_mode: none

  credit_report:
    profile_id: credit_report
    min_char_preservation: 0.98
    min_reading_order: 0.85
    oracle_mode: none

cases:
  - id: wechat_logical_rows_full
    tier: regression
    fixture: fixtures/wechat_payment/synthetic_easy_standard.pdf
    pipeline: extract_only
    gate_profile: wechat_payment
    gates:
      page_count: { min: 1 }
      table_count: { min: 1 }
    failure_class: table_extraction
    tags: [cashflow, wechat, synthetic]

  - id: alipay_logical_rows
    tier: regression
    fixture: fixtures/alipay_payment/synthetic_easy_standard.pdf
    pipeline: extract_only
    gate_profile: alipay_payment
    gates:
      page_count: { min: 1 }
      table_count: { min: 1 }
    tags: [cashflow, alipay, synthetic]

  - id: wechat_first_pages_smoke
    tier: regression
    fixture: fixtures/wechat_payment/synthetic_easy_standard.pdf
    pipeline: extract_only
    options:
      max_pages: 5
    gates:
      table_count: { min: 1 }
    tags: [cashflow, wechat, smoke_subset, synthetic]

  - id: bank_statement_three_page_merge
    tier: regression
    fixture: fixtures/synthetic/bank_ledger_3page_smoke.pdf
    pipeline: extract_only
    gates:
      page_count: { equals: 3 }
      table_count: { min: 1 }
    tags: [cashflow, bank, synthetic]

  - id: generic_plugin_extract
    tier: regression
    fixture: fixtures/id_card/ZhangSan_身份证_1976112.pdf
    skip_if_fixture_missing: true
    pipeline: extract_only
    gates:
      page_count: { min: 1 }
      table_count: { max: 3 }
    tags: [identity]

  - id: id_card_text_snapshot
    tier: regression
    fixture: fixtures/id_card/ZhangSan_身份证_1976112.pdf
    skip_if_fixture_missing: true
    pipeline: extract_only
    gates:
      page_count: { min: 1 }
    oracle:
      text_snapshot:
        min_text_lines: 5
        expected_sha256: b4e16e6ed5c30f62172e3607bd6e40f732973856940ae995a4d85d58abc38b52
        contains:
          - ZhangSan
          - "SYNTHETIC_ID_TOKEN"
          - SamplePSB
    tags: [identity, text_snapshot]

  - id: business_license_no_table
    tier: regression
    fixture: fixtures/business_license/synthetic_medium_variant.pdf
    pipeline: extract_only
    gates:
      table_count: { max: 2 }
    tags: [identity, license]

  - id: credit_report_section_mode
    tier: regression
    fixture: fixtures/synthetic/credit_report_section_smoke.pdf
    pipeline: extract_only
    gate_profile: credit_report
    gates:
      content_type: { equals: section_dominant }
      layout_profile_id:
        in: [credit_report_section_dominant, generic, null]
      table_count: { max: 2 }
    tags: [credit_report, section_driven, synthetic]
