# DocMirror GA 1.0 — Formula DGC Gate
# Generated: 2026-06-21 for F11 (formula quality benchmark)
#
# Validates formula recognition quality:
#   - AST structural equivalence rate (golden comparisons)
#   - Inline/Display classification accuracy
#   - MathML validity
#   - Evidence attachment rate
#   - Spoken text availability
#
# Design ref: 19_formula_recognition_first_principles_redesign.md

version: 1
track: recognize
layer: mep
cases:
  # ── Formula AST & Recognition ──────────────────────────────────────
  - id: formula_ast_quadratic
    tier: regression
    fixture: tests/fixtures-private/formula/quadratic_formula.pdf
    pipeline: perceive
    options:
      profile: forensic
    gates:
      document_type:
        equals: generic
      status:
        in:
        - success
        - partial
      formula_ast_equiv_rate:
        min: 0.85
    tags:
    - formula
    - f11
    - ast

