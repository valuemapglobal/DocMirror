# ══════════════════════════════════════════════════════════════════════════════
# Key Synonyms — Multilingual Entity Key Normalization
# ══════════════════════════════════════════════════════════════════════════════
#
# Maps locale-specific raw key names (as extracted from documents) to their
# canonical English equivalents used by DOMAIN_IDENTITY in domain/registry.py.
#
# This file is the single source of truth for key normalization. To support
# a new language or document variant, simply add entries under the appropriate
# locale section — no Python code changes needed.
#
# Rules:
#   - Keys are raw strings exactly as they appear in extracted KV blocks.
#   - Values MUST match a candidate key in DOMAIN_IDENTITY (domain/registry.py).
#   - Organized by domain → locale for readability.
#   - At runtime, all entries are flattened into a single lookup table.

# ── Bank Statement ────────────────────────────────────────────────────────────
bank_statement:
  zh:
    # Account number
    账号: "Account number"
    卡号: "Account number"
    账户号: "Account number"
    账户号码: "Account number"
    客户账号: "Account number"
    # Account holder
    账户名: "Account name"
    账户名称: "Account name"
    户名: "Account name"
    客户名称: "Customer name"
    持卡人: "Card holder"
    # Currency
    币种: "Currency"
    币别: "Currency"
    # Query period
    交易时间: "Query period"
    查询期间: "Query period"
    交易期间: "Query period"
    账单周期: "Query period"
    起止日期: "Query period"
    # Print date
    打印日期: "Print date"
    打印时间: "Print date"
    # Bank name
    银行名称: "Bank name"
    开户行: "Bank name"
    开户银行: "Bank name"
  ja:
    口座番号: "Account number"
    口座名義: "Account name"
    通貨: "Currency"
    取引期間: "Query period"
    印刷日: "Print date"
    銀行名: "Bank name"

