# Failure Code Registry — canonical failure/degradation taxonomy
# =================================================================
# Part of the Failure & Degradation Contract (FDC) for DocMirror GA 1.0.
# Every public error, warning, fallback, and degradation MUST have a
# registered entry here so CLI / SDK / REST / Task / Manifest surfaces
# share the same semantics.
#
# Field glossary:
#   canonical_code    Stable UPPER_SNAKE_CASE identifier (internal).
#   user_code         Stable lower_snake_case identifier (public API).
#   category          input / parse / ocr / table / license / domain / runtime / artifact
#   default_scope     document / page / table / field / edition / task
#   severity          info / warning / degraded / partial / error / fatal
#   recoverable       Whether user action (convert, install, rescan, etc.) can fix it.
#   retryable         Whether a direct retry is safe.
#   default_message   Human-readable one-line explanation.
#   default_suggestion What the user should do next.
#   docs_anchor       Slug pointing to the relevant docs section.
#   public            Whether this code is exposed to end users.

# ── Input / Format category ──────────────────────────────────────
file_not_found:
  canonical_code: FILE_NOT_FOUND
  user_code: file_not_found
