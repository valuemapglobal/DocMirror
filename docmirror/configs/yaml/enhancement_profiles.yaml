# Enhancement profiles — middleware pipelines keyed by content_model × enhance_mode.
# SSOT for Orchestrator MEP; validated by scripts/validate/validate_middleware_catalog.py
# Internal design reference: middleware layer redesign.

version: 2

profiles:
  fixed_layout_rasterizable:
    raw: []
    standard:
      stages:
        RECONSTRUCT: [GeometricReconstructor]
        RESTORE: [LlmDocumentRestorer]
        STRUCTURE: [HeaderInferrer, HeaderAlignment]
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
        VALIDATE: [Validator]
    full:
      stages:
        NORMALIZE: [LanguageDetector]
        RECONSTRUCT: [GeometricReconstructor]
        RESTORE: [LlmDocumentRestorer]
        STRUCTURE: [HeaderInferrer, HeaderAlignment]
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
        VALIDATE: [Validator, AnomalyDetector]

  tabular_native:
    raw: []
    standard:
      stages:
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
    full:
      stages:
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
        VALIDATE: [Validator]

  markup_narrative:
    raw: []
    standard:
      stages:
        NORMALIZE: [LanguageDetector]
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
    full:
      stages:
        NORMALIZE: [LanguageDetector]
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]
        VALIDATE: [Validator]

  interchange_structured:
    raw: []
    standard:
      stages:
        ENRICH: [GenericEntityExtractor]
    full:
      stages:
        ENRICH: [GenericEntityExtractor]
        CLASSIFY: [EvidenceEngine]

  container:
    raw: []
    standard:
      stages: {}
    full:
      stages: {}

  opaque_binary:
    raw: []
    standard:
      stages: {}
    full:
      stages: {}

transport_fallback:
  pdf: fixed_layout_rasterizable
  image: fixed_layout_rasterizable
  ofd: fixed_layout_rasterizable
  excel: tabular_native
  word: markup_narrative
  ppt: markup_narrative
  email: markup_narrative
  web: markup_narrative
  structured: interchange_structured
  archive: container
