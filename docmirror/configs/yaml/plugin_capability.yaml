# Plugin capability matrix — community vs enterprise coverage per document_type.
# See docs/design/14_community_focus_six_plus_generic_checklist.md

version: 2

# Community premium plugins (full structured extract — 6 domains)
community_premium_domains:
  - bank_statement
  - wechat_payment
  - alipay_payment
  - vat_invoice
  - business_license
  - credit_report

# When true, classified non-premium non-enterprise types use generic_community fallback
community_generic_enabled: true

# Explicit enterprise-only types (mirror_only envelope on community edition; no generic)
enterprise_only:
  - audit_report
  - balance_sheet
  - income_statement
  - cash_flow_statement
  - aml_report
  - court_judgment
  - fund_contract
  - wealth_management_contract
  - guarantee_contract
