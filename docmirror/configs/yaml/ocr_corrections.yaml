lexicons:
  common_english:
    domains: []
    roles: [text_line, field_label, table_header, institution, unknown]
    terms:
      - Microsoft
      - Corporation
      - Company
      - Limited
      - transaction
      - Account
      - Invoice
      - Contract
      - Bank

  financial_report:
    domains: [financial_report]
    roles: [field_label, table_header]
    terms:
      - 营业收入
      - 营业成本
      - 净利润
      - 资产负债率
      - 流动比率
      - 速动比率
      - 货币资金
      - 应收账款
      - 应付账款
      - 资产总计
      - 负债合计

  business_license:
    domains: [business_license]
    roles: [field_label, table_header]
    terms:
      - 名称
      - 统一社会信用代码
      - 法定代表人
      - 注册资本
      - 成立日期
      - 营业期限
