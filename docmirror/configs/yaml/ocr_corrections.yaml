# Safe OCR correction rules for Mirror JSON 1.0.2.
#
# Rules are deliberately small and contextual.  A glyph confusion lowers the
# candidate distance; it is never a global character replacement.

version: 1

thresholds:
  max_weighted_distance: 1.0
  min_candidate_margin: 0.5

confusions:
  "0": ["O", "o"]
  "1": ["I", "l"]
  "2": ["Z", "z"]
  "5": ["S", "s"]
  "8": ["B", "b"]
  "牧": ["收"]
  "牢": ["率"]
  "木": ["本"]
  "人": ["入"]
  "忖": ["付"]
  "村": ["付"]

rules:
  - id: finance.operating_revenue
    observed: "营业牧入"
    canonical: "营业收入"
    domains: [financial_report]
    roles: [field_label, table_header, unknown]

  - id: finance.debt_ratio
    observed: "资产负债牢"
    canonical: "资产负债率"
    domains: [financial_report]
    roles: [field_label, table_header, unknown]

  - id: finance.registered_capital
    observed: "注册资木"
