# Conflict Resolution Strategy
conflict_resolution:
  strategy: "priority_first"  # priority_first: select highest-priority rule first
  generate_pending_report: true  # Generate pending report
  multi_match_threshold: 2  # Record as pending when matched categories exceed this threshold

# File Processing Options
file_handling:
  skip_hidden_files: true  # Skip hidden files
  skip_system_files: true  # Skip system files
  max_file_size_mb: 500  # Max file size (MB); larger files are skipped
  supported_extensions:
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"
    - ".ppt"
    - ".pptx"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".tiff"
    - ".bmp"
    - ".txt"
    - ".json"
    - ".csv"
    - ".eml"
    - ".html"
    - ".htm"
