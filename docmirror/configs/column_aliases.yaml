# =============================================================================
# Column Mapper Configuration (column_aliases.yaml)
# =============================================================================
#
# External data configuration for the ColumnMapper middleware.
# Loaded automatically by ColumnMapper.__init__() at runtime.
#
# Sections:
#   target_columns   — Standard column names that the mapper normalizes to.
#   skip_columns     — Raw column names that should be preserved but NOT mapped.
#   column_aliases   — Standard name → list of known aliases (raw header variants).
#   income_keywords  — Column names indicating credit/income amounts.
#   expense_keywords — Column names indicating debit/expense amounts.
#   amount_like_keywords — Column names that represent transaction amounts
#                          (used when debit/credit are in a single column).

# Standard target columns (the canonical names after mapping)
target_columns:
  - 序号
  - 交易时间
  - 对方账号与户名
  - 摘要
  - 用途
  - 备注
  - 交易金额
  - 账户余额
  - 钞汇
  - 币别

# Raw column names to skip during mapping (kept as-is, not standardized)
skip_columns:
  - 企业流水号
  - 凭证种类
  - 凭证号
  - 交易介质编号
  - 账户明细编号-交易流水号
  - 凭证类型凭证号码
  - 凭证类型 凭证号码
  - 凭证类型
  - 凭证号码
  - 交易渠道
  - 交易机构
  - 对方行名
  - 借贷状态
  - 支/收
  - 借贷标志
  - 收支
  - 柜员流水号
  - 摘要代码

# Column name alias dictionary: standard_name → known aliases
# The mapper checks raw headers against these aliases to find the standard name.
column_aliases:
  序号:
    - 流水号
    - 序
    - 编号
    - Seq
    - "No"
    - SeqNo
    - 序号

  交易时间:
    - 交易日期
    - 日期
    - 交易日
    - 记账日期
    - 入账日期
    - Date
    - Transaction Date
    - 记帐日期
    - 交易时间

  对方账号与户名:
    - 对方户名
    - 对方名称
    - 收/付款人
    - 对方账户
    - Counterparty
    - 对手方
    - 对方信息
    - 交易对手信息
    - 交易对手
    - 对方户名/账号
    - 对方账户/对方银行
    - 交易机构对方户名/账号

  摘要:
    - 交易摘要
    - 摘要
    - 说明
    - 用途/摘要
    - 备注/摘要
    - Description
    - Summary
    - 交易类型
    - 业务摘要
    - 交易方式
    - 序号摘要
    - 序号 摘要

  用途:
    - 用途
    - 附言
    - Purpose
    - Remark
    - 交易地点/附言
    - 交易地点

  备注:
    - 备注
    - Memo
    - Note
    - 附注

  交易金额:
    - 金额
    - 交易金额
    - 发生额
    - Amount
    - 收入金额
    - 支出金额
    - 人民币
    - 交易额
    - 收入
    - 支出

  账户余额:
    - 余额
    - 账户余额
    - Balance
    - 结存
    - 可用余额
    - 期末余额
    - 本次余额
    - 账户余额现转标志交易渠道
    - 账户余额 现转标志 交易渠道

  钞汇:
    - 钞汇标志
    - 钞汇
    - Cash/Transfer
    - 币别钞汇
    - 币别 钞汇
    - 现转标志
    - 现转

  币别:
    - 币种
    - 币别
    - Currency
    - CCY

# Keywords to identify income/credit columns (used for debit-credit splitting)
income_keywords:
  - 收入
  - 贷方
  - 存入
  - 收入金额
  - 贷方发生额
  - Credit

# Keywords to identify expense/debit columns
expense_keywords:
  - 支出
  - 借方
  - 支取
  - 支出金额
  - 借方发生额
  - Debit

# Keywords that indicate a general amount column (when debit/credit are combined)
amount_like_keywords:
  - 发生额
  - 金额
  - 交易金额
  - 交易额
  - Amount
