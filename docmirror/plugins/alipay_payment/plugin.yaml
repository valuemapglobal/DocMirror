schema_version: 1

provider:
  id: alipay_payment
  domain_name: alipay_payment
  version: community-1
  implementation: docmirror.plugins.alipay_payment.community_plugin:plugin

projection:
  dataset_aliases: {records: transactions}
  dataset_labels: {transactions: 交易流水}
  dataset_types: {transactions: transaction}
  section_type_markers: {交易: transactions}
  completeness:
    records:
      basis: physical_marker_rows
      public_basis: physical_payment_rows
      first_column_values: [收入, 支出, 其他, 不计收支]

projection_outputs:
  document_type: alipay_payment
  datasets: [records]
  domain_fact_prefix: alipay_payment
