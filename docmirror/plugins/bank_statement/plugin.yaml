schema_version: 1

provider:
  id: bank_statement
  domain_name: bank_statement
  version: community-1
  implementation: docmirror.plugins.bank_statement.community_plugin:plugin

projection:
  dataset_aliases: {records: transactions}
  dataset_labels: {transactions: 交易流水}
  dataset_types: {transactions: transaction}
  section_type_markers: {交易: transactions}

resources:
