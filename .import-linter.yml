# DocMirror Import Dependency Contract (GA1.0)
# ==============================================
# 
# This file defines the allowed import direction between bounded contexts.
# The CPS architecture defines 7 stages with a strict DAG dependency order.
# 
# Current status: SOFT-ENFORCE (warning only, not blocking in CI yet)
# Target status: HARD-ENFORCE (blocking in CI after GA1.0 migration)
#
# See: docs/design/GA1.0/GA1.0-02-core-architecture.md

root_package: docmirror

contract_types:
  forbidden_imports:
    - name: cps_dag
      description: CPS stage N cannot import from stage N+2 or later (skip-level)
      # These rules will be tightened as GA1.0 restructuring progresses

# External modules that are allowed for all packages
external_modules:
  - regex: ^pydantic\.*
  - regex: ^typing\.*
  - regex: ^(pathlib|os|sys|re|json|abc|enum|functools|itertools|collections|dataclasses|datetime|types|logging|warnings|inspect|copy|math|csv|hashlib|uuid|textwrap|shutil|tempfile|html)\.*
  - regex: ^numpy\.*
  - regex: ^PIL\.*
  - regex: ^yaml\.*
  - regex: ^rich\.*
  - regex: ^importlib\.*

forbidden_imports:

  # ---- Layer 1: Entry is the public API ----
  # Entry should not import from internal stages
  - importer_regex: ^docmirror\.core\.entry\.
    not_allowed:
      - docmirror.core.extraction
      - docmirror.core.extract
      - docmirror.core.ocr
      - docmirror.core.table
      - docmirror.core.bridge
      - docmirror.plugins
      - docmirror.server

  # ---- Layer 2: Pipeline orchestration ----
  # Pipeline imports from entry (options) but not from later stages
  - importer_regex: ^docmirror\.core\.pipeline\.
    not_allowed:
      - docmirror.core.ocr
      - docmirror.core.table
      - docmirror.core.bridge
      - docmirror.plugins
      - docmirror.server

  # ---- Layer 3: Segment ----
  # Segment imports from pipeline (context) but not from later stages
  - importer_regex: ^docmirror\.core\.segment\.
    not_allowed:
      - docmirror.core.ocr
      - docmirror.core.bridge
      - docmirror.core.table
      - docmirror.server

  # ---- Layer 4: OCR is leaf ----
  # OCR must NOT import from core, adapters, or plugins
  - importer_regex: ^docmirror\.core\.ocr\.
    not_allowed:
      - docmirror.core.extraction
      - docmirror.core.extract
      - docmirror.core.pipeline
      - docmirror.core.segment
      - docmirror.core.table
      - docmirror.core.bridge
      - docmirror.adapters
      - docmirror.plugins
      - docmirror.server

  
  # ---- Layer 4b: docmirror.ocr (promoted bounded context) ----
  # OCR must NOT import from core, adapters, or plugins
  - importer_regex: ^docmirror\.ocr\.
    not_allowed:
      - docmirror.core
      - docmirror.adapters
      - docmirror.plugins
      - docmirror.server
# ---- Layer 5: Core cannot import from UI/output layers ----
  - importer_regex: ^docmirror\.core\.
    not_allowed:
      - docmirror.server
      - docmirror.adapters
      - docmirror.plugins

  # ---- Layer 6: Exporters/output must not import from core internals ----
  - importer_regex: ^docmirror\.exporters\.
    not_allowed:
      - docmirror.core.extraction
      - docmirror.core.extract
      - docmirror.core.ocr
      - docmirror.core.table
      - docmirror.core.segment
      - docmirror.core.pipeline

  # ---- Layer 7: Bridge is read-only ----
  # Bridge reads from all stages but must not import from adapters or server
  - importer_regex: ^docmirror\.core\.bridge\.
    not_allowed:
      - docmirror.adapters
      - docmirror.plugins
      - docmirror.server
